name: Smoke Build (Manual)

on:
  workflow_dispatch:
    inputs:
      runTypeCheck:
        description: 'Also run TypeScript type-check'
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: Next.js build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        if: ${{ github.event.inputs.runTypeCheck == 'true' }}
        run: npm run type-check

      - name: Build
        run: npm run build

