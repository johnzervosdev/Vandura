name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Type Check & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create database
        run: npm run db:migrate
        env:
          DATABASE_URL: ./data/ci-${{ github.run_id }}-${{ github.run_attempt }}.db

      - name: Type check
        run: npm run type-check
        env:
          DATABASE_URL: ./data/ci-${{ github.run_id }}-${{ github.run_attempt }}.db

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: ./data/ci-${{ github.run_id }}-${{ github.run_attempt }}.db
